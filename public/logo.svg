<svg width="64" height="64" viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="64" y2="64" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#06b6b6"/>
      <stop offset="1" stop-color="#047878"/>
    </linearGradient>
    <linearGradient id="waveGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#e6f7fa" stop-opacity="0.95"/>
      <stop offset="1" stop-color="#e6f7fa" stop-opacity="0.6"/>
    </linearGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="1.2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect width="64" height="64" rx="16" ry="16" fill="url(#bgGrad)"/>

  <rect x="14" y="22" width="3" height="20" rx="1.5" fill="url(#waveGrad)" filter="url(#glow)"/>
  <rect x="20" y="16" width="3" height="32" rx="1.5" fill="url(#waveGrad)" filter="url(#glow)"/>
  <rect x="26" y="12" width="3" height="40" rx="1.5" fill="url(#waveGrad)" filter="url(#glow)"/>
  <rect x="32" y="18" width="3" height="28" rx="1.5" fill="url(#waveGrad)" filter="url(#glow)"/>
  <rect x="38" y="14" width="3" height="36" rx="1.5" fill="url(#waveGrad)" filter="url(#glow)"/>
  <rect x="44" y="20" width="3" height="24" rx="1.5" fill="url(#waveGrad)" filter="url(#glow)"/>

  <circle cx="32" cy="32" r="30" stroke="#0fd4d4" stroke-opacity="0.25" stroke-width="0.8" fill="none"/>
</svg>
